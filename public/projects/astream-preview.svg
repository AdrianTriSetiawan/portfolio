<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk', 'DM Sans', system-ui, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#0a0a0f"/>

  <!-- Subtle radial gradient bg -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <linearGradient id="playerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="progressGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Top nav -->
  <rect x="0" y="0" width="800" height="52" fill="#111118" opacity="0.95"/>
  <line x1="0" y1="52" x2="800" y2="52" stroke="#1e1830" stroke-width="1"/>
  <!-- Logo -->
  <text x="32" y="34" fill="#8b5cf6" font-size="20" font-weight="800" letter-spacing="-1">A</text>
  <text x="48" y="34" fill="#e5e7eb" font-size="18" font-weight="700">STREAM</text>
  <!-- Nav links -->
  <text x="200" y="32" fill="#6b7280" font-size="12">Home</text>
  <text x="260" y="32" fill="#8b5cf6" font-size="12" font-weight="600">Browse</text>
  <text x="320" y="32" fill="#6b7280" font-size="12">Recently</text>
  <text x="392" y="32" fill="#6b7280" font-size="12">Genres</text>

  <!-- Search bar -->
  <rect x="520" y="14" width="200" height="28" rx="14" fill="#1e1830" stroke="#2d1f4a" stroke-width="1"/>
  <text x="540" y="33" fill="#4a5568" font-size="11">Search anime...</text>
  <text x="706" y="33" fill="#6b7280" font-size="14">⌕</text>

  <!-- Featured / currently watching large card -->
  <rect x="24" y="68" width="480" height="270" rx="12" fill="url(#playerGrad)" stroke="#2d1f4a" stroke-width="1"/>

  <!-- "Thumbnail" gradient fill -->
  <defs>
    <linearGradient id="thumbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0e35"/>
      <stop offset="60%" stop-color="#0f0820"/>
      <stop offset="100%" stop-color="#080510"/>
    </linearGradient>
  </defs>
  <rect x="24" y="68" width="480" height="200" rx="12" fill="url(#thumbGrad)"/>

  <!-- Decorative anime-style silhouette shapes -->
  <ellipse cx="280" cy="200" rx="90" ry="110" fill="#1a0e35" opacity="0.5"/>
  <!-- character stylized shapes -->
  <ellipse cx="280" cy="148" rx="28" ry="28" fill="#221040" opacity="0.8"/>
  <rect x="254" y="176" width="52" height="80" rx="10" fill="#221040" opacity="0.7"/>
  <!-- hair spikes -->
  <polygon points="265,132 258,112 272,128" fill="#2d1855" opacity="0.8"/>
  <polygon points="280,130 278,108 288,128" fill="#2d1855" opacity="0.8"/>
  <polygon points="295,132 300,112 288,128" fill="#2d1855" opacity="0.8"/>
  <!-- glow effect -->
  <ellipse cx="280" cy="168" rx="50" ry="50" fill="#8b5cf6" opacity="0.06"/>

  <!-- Stars/particles -->
  <circle cx="60" cy="90" r="1" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="120" cy="110" r="1.5" fill="#c084fc" opacity="0.4"/>
  <circle cx="80" cy="140" r="1" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="450" cy="95" r="1" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="420" cy="130" r="1.5" fill="#c084fc" opacity="0.4"/>
  <circle cx="470" cy="150" r="1" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="150" cy="85" r="1" fill="#c084fc" opacity="0.3"/>
  <circle cx="380" cy="200" r="1" fill="#8b5cf6" opacity="0.5"/>

  <!-- Episode info overlay -->
  <rect x="24" y="248" width="480" height="90" rx="0" fill="#0a0a0f" opacity="0.7"/>
  <rect x="24" y="248" width="480" height="90" rx="0" fill="url(#playerGrad)" opacity="0.9"/>

  <!-- Progress bar -->
  <rect x="36" y="260" width="456" height="3" rx="2" fill="#2d1f4a"/>
  <rect x="36" y="260" width="280" height="3" rx="2" fill="url(#progressGrad)"/>
  <circle cx="316" cy="261.5" r="5" fill="#c084fc"/>

  <!-- Time -->
  <text x="36" y="282" fill="#9ca3af" font-size="10">12:34</text>
  <text x="480" y="282" text-anchor="end" fill="#9ca3af" font-size="10">23:48</text>

  <!-- Controls -->
  <text x="190" y="286" fill="#6b7280" font-size="16">⏮</text>
  <text x="222" y="290" fill="#e5e7eb" font-size="22">⏸</text>
  <text x="258" y="286" fill="#6b7280" font-size="16">⏭</text>
  <text x="310" y="284" fill="#4a5568" font-size="11">Volume</text>
  <rect x="360" y="277" width="60" height="4" rx="2" fill="#2d1f4a"/>
  <rect x="360" y="277" width="38" height="4" rx="2" fill="#8b5cf6"/>
  <text x="450" y="284" fill="#4a5568" font-size="11">HD</text>

  <!-- Title below player -->
  <text x="36" y="318" fill="#e5e7eb" font-size="14" font-weight="700">Sword Art Online — Episode 14</text>
  <text x="36" y="334" fill="#6b7280" font-size="11">Source: gogoanime · via Consumet API · No Ads</text>

  <!-- Episode list right side -->
  <rect x="520" y="68" width="256" height="270" rx="12" fill="#111118" stroke="#1e1830" stroke-width="1"/>
  <text x="540" y="92" fill="#e5e7eb" font-size="13" font-weight="700">Episodes</text>
  <text x="756" y="92" text-anchor="end" fill="#6b7280" font-size="11">48 eps</text>
  <line x1="520" y1="100" x2="776" y2="100" stroke="#1e1830" stroke-width="1"/>

  <!-- Episode items -->
  <!-- Active ep -->
  <rect x="528" y="106" width="240" height="44" rx="8" fill="#1a0e35" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
  <rect x="540" y="116" width="52" height="30" rx="4" fill="#221040"/>
  <text x="566" y="135" text-anchor="middle" fill="#8b5cf6" font-size="9">EP 14</text>
  <text x="604" y="124" fill="#e5e7eb" font-size="11" font-weight="600">The End of the World</text>
  <text x="604" y="138" fill="#6b7280" font-size="10">23:48 · Playing</text>
  <circle cx="757" cy="128" r="4" fill="#8b5cf6"/>

  <!-- Other eps -->
  <rect x="528" y="158" width="240" height="44" rx="8" fill="#111118"/>
  <rect x="540" y="168" width="52" height="30" rx="4" fill="#1a1820"/>
  <text x="566" y="187" text-anchor="middle" fill="#4a5568" font-size="9">EP 15</text>
  <text x="604" y="176" fill="#9ca3af" font-size="11">Return</text>
  <text x="604" y="190" fill="#4a5568" font-size="10">24:00</text>

  <rect x="528" y="210" width="240" height="44" rx="8" fill="#111118"/>
  <rect x="540" y="220" width="52" height="30" rx="4" fill="#1a1820"/>
  <text x="566" y="239" text-anchor="middle" fill="#4a5568" font-size="9">EP 16</text>
  <text x="604" y="228" fill="#9ca3af" font-size="11">Land of the Setting Sun</text>
  <text x="604" y="242" fill="#4a5568" font-size="10">23:55</text>

  <rect x="528" y="262" width="240" height="44" rx="8" fill="#111118"/>
  <rect x="540" y="272" width="52" height="30" rx="4" fill="#1a1820"/>
  <text x="566" y="291" text-anchor="middle" fill="#4a5568" font-size="9">EP 17</text>
  <text x="604" y="280" fill="#9ca3af" font-size="11">Captive Queen</text>
  <text x="604" y="294" fill="#4a5568" font-size="10">24:10</text>

  <!-- Bottom browse section -->
  <text x="24" y="368" fill="#e5e7eb" font-size="14" font-weight="700">Continue Watching</text>

  <!-- 3 anime cards -->
  <!-- Card 1 -->
  <rect x="24" y="380" width="148" height="96" rx="8" fill="#111118" stroke="#1e1830" stroke-width="1"/>
  <rect x="24" y="380" width="148" height="64" rx="8" fill="#1a0e35"/>
  <ellipse cx="98" cy="415" rx="30" ry="32" fill="#221040" opacity="0.6"/>
  <text x="32" y="460" fill="#e5e7eb" font-size="11" font-weight="600">Attack on Titan</text>
  <text x="32" y="472" fill="#6b7280" font-size="10">Ep 7 / 25</text>

  <!-- Card 2 -->
  <rect x="184" y="380" width="148" height="96" rx="8" fill="#111118" stroke="#1e1830" stroke-width="1"/>
  <rect x="184" y="380" width="148" height="64" rx="8" fill="#0e1a2e"/>
  <ellipse cx="258" cy="415" rx="30" ry="32" fill="#0a1020" opacity="0.7"/>
  <text x="192" y="460" fill="#e5e7eb" font-size="11" font-weight="600">Naruto Shippuden</text>
  <text x="192" y="472" fill="#6b7280" font-size="10">Ep 42 / 500</text>

  <!-- Card 3 -->
  <rect x="344" y="380" width="148" height="96" rx="8" fill="#111118" stroke="#1e1830" stroke-width="1"/>
  <rect x="344" y="380" width="148" height="64" rx="8" fill="#1a1a0e"/>
  <ellipse cx="418" cy="415" rx="30" ry="32" fill="#22200a" opacity="0.6"/>
  <text x="352" y="460" fill="#e5e7eb" font-size="11" font-weight="600">One Piece</text>
  <text x="352" y="472" fill="#6b7280" font-size="10">Ep 800 / 1100</text>

  <!-- No ads badge -->
  <rect x="520" y="380" width="256" height="96" rx="8" fill="#111118" stroke="#1e1830" stroke-width="1"/>
  <text x="648" y="415" text-anchor="middle" fill="#8b5cf6" font-size="28" font-weight="800">0</text>
  <text x="648" y="433" text-anchor="middle" fill="#6b7280" font-size="11">Ads per episode</text>
  <text x="648" y="450" text-anchor="middle" fill="#4a5568" font-size="10">Hosted on Cloudflare Pages</text>
  <text x="648" y="466" text-anchor="middle" fill="#4a5568" font-size="10">astream.pages.dev</text>

  <!-- Bottom bar -->
  <rect x="0" y="488" width="800" height="12" fill="#111118" opacity="0.8"/>
  <text x="400" y="497" text-anchor="middle" fill="#1e1830" font-size="9" letter-spacing="3">HTML · CSS · JAVASCRIPT · CONSUMET API · CLOUDFLARE PAGES</text>
</svg>
